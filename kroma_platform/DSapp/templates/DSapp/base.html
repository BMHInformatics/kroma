{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}KroMA | Home{% endblock %}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    >
    <!-- styles and kroma CSS -->
    <link rel="stylesheet" href="{% static 'css/styles.css' %}">
    <link rel="stylesheet" href="{% static 'css/kroma.css' %}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Markdown parser for chatbot responses -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>


    {% block extra_head %}{% endblock %}
</head>

<body>
<nav class="navbar navbar-expand-lg ds-header">
    <div class="container-fluid px-4 d-flex align-items-center justify-content-between">

        <!-- LEFT: Logo -->
        <div class="header-logo d-flex align-items-center">
            <img src="{% static 'img/kroma_logo.jpg' %}" alt="KroMA Logo" class="kroma-logo">
        </div>

        <!-- CENTER: Title -->
        <div class="mx-auto text-center header-title-wrapper">
            <div class="kroma-title">KroMA</div>
            <div class="kroma-subtitle">(Knowledge Graph-Grounded Medical Agent)</div>
        </div>

        <!-- RIGHT: Login/Logout -->
        {% if user.is_authenticated %}
        <div class="ms-auto d-flex flex-column align-items-center gap-2">

          <span class="user-badge">{{ user.username }}</span>

          <form method="post" action="{% url 'kroma:logout' %}" class="mb-0">
              {% csrf_token %}
              <button type="submit" class="btn btn-sm btn-outline-light">
                  Logout
              </button>
          </form>
        </div>
        {% endif %}
    </div>
</nav>

<div class="container-fluid main-container">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}

<script>
(function () {
  const fab = document.querySelector('.feedback-fab');
  if (!fab) return;

  let scrollTimeout = null;

  function onScroll() {
    // Fade while scrolling
    fab.classList.add('hidden');

    // Clear any previous "scroll stopped" timer
    if (scrollTimeout) clearTimeout(scrollTimeout);

    // If no scroll events for 180ms, treat it as "stopped"
    scrollTimeout = setTimeout(() => {
      fab.classList.remove('hidden');
    }, 180);
  }

  window.addEventListener('scroll', onScroll, { passive: true });
  window.addEventListener('load', () => fab.classList.remove('hidden'));
})();

</script>

</body>
</html>
